<style>
*{margin:0;padding:0;box-sizing:border-box}

.btn-outline{background:#fff;color:#555;border:2px solid #ddd}.btn-outline:hover:not(:disabled){border-color:#999}

{id:1,q:"A salesforce Manufacturing cloud user finds that the current sales agreement data is not displaying in tableau CRM for manufacturing. What two possibilities could cause this to happen?",options:{A:"The sales agreement was linked to person accounts",B:"Sales agreements are only displayed in the grid",C:"The sales agreement was not added to the data flow",D:"The sales agreement data flow was not updated"},answer:["C","D"],multi:true},
{id:2,q:"Universal Containers (UC) currently uses Sales Agreements to track its annual plans with customers but is working with a consultant to set up Advanced Account Forecasting.\nUC stores shipped/invoiced order data in a child-custom object related to the standard Order object.\nUC has two primary requirements:\n1) To see its forecast by Product Code and Product Category\n2) To see actual order data broken out into three metrics: Quantity Ordered but still Open, Quantity Ordered but Shipped, and Quantity Invoiced\nHow should a consultant set up Advanced Account Forecasting to fulfill these requirements?",options:{A:"On the Forecast Fact - Configure two new custom dimension fields (product code and product category) and three new custom metric fields. Modify the OOTB DPE templates to incorporate the new dimensions and aggregate the data.",B:"On the Forecast Fact - Configure three new custom metric fields. Modify the OOTB DPE templates to aggregate just the new metrics; the new dimension will be automatically incorporated from the product.",C:"On the Forecast Fact - Configure two custom dimension fields and two new custom metric fields. Modify the OOTB DPE templates to incorporate the new dimensions; the new metric aggregation will be automatic."},answer:["A"],multi:false},
{id:3,q:"An account manager needs to analyze the business performance of several business units and wants to create a sales forecast based on customer accounts, products, and business units.\nWhich forecast solution provides the metrics the account manager is looking for?",options:{A:"Account Forecasting",B:"Account Manager Targets",C:"Advanced Account Forecasting"},answer:["C"],multi:false},
{id:4,q:"Which Manufacturing Intelligence dashboard should a consultant use to identify products that could upsell and cross-sell across all accounts for the next quarter?",options:{A:"Whitespace Analysis",B:"Pricing Insights",C:"Team Targets"},answer:["A"],multi:false},
{id:5,q:"In Tableau CRM for Manufacturing, which three user types can be selected to receive credit for an order in the Tableau CRM configuration wizard then calculating actuals against account manager targets?",options:{A:"Other User",B:"Opportunity Owner",C:"Custom Lookup Field for a user on Account",D:"Order Owner",E:"Account Owner"},answer:["A","D","E"],multi:true},
{id:6,q:"What is the maximum number of products a sales agreement can have?",options:{A:"1500",B:"500",C:"100",D:"1000"},answer:["A"],multi:false},
{id:7,q:"Which two list views are provided by default to filter account manager targets by the assigned user?",options:{A:"Active Targets",B:"Pending Targets",C:"Assigned by Me",D:"Assigned to Me",E:"Assigned by Manager"},answer:["C","D"],multi:true},
{id:8,q:"Universal Containers (UC) is preparing to roll out its new Manufacturing Cloud. UC has asked a group of end users to conduct preliminary testing. A group of 12 users is conducting testing and must give the go-ahead to deploy all settings to the production environment.\nWhich items are necessary to conduct proper testing?",options:{A:"Process scripts; Sandbox access; Communication guidelines",B:"Sandbox access; Test data; Process scripts",C:"Profile configuration; Process scripts; User permissions"},answer:["B"],multi:false},
{id:9,q:"An administrator has updated the team member hierarchy type from Forecasts hierarchy to Manager hierarchy on the account manager target.\nWhat will happen to existing targets?",options:{A:"All access to existing targets will be deleted.",B:"Status for all existing targets will become Read-only.",C:"Status for all existing targets will become Draft."},answer:["B"],multi:false},
{id:10,q:"If an organization would like to apply a rebate program to more than one account, which course of action should be taken?",options:{A:"Create a new rebate program for each account",B:"Add each account to the rebate benefits related list to the rebate program",C:"Add each account to the members related list on the rebate program"},answer:["C"],multi:false},
{id:11,q:"Which approach reduces the number of manual process steps and leverages automation technology to load the partner's Proof-of-Sale data required as supporting information for rebate claims?",options:{A:"Expose the Proof-of-Sale object to the partner via the partner Experience Cloud site, allow the partner to create a new record and enter the required information.",B:"Enable the partner to upload scanned images of their customer invoices from the partner Experience Cloud and convert the images into text.",C:"Configure an EDI B2B integration to the partner's ERP system using MuleSoft or other middleware to transfer the data."},answer:["C"],multi:false},
{id:12,q:"Universal container wants to streamline the way they collaborate on sales agreement with their channel partners. Which is the recommended option?",options:{A:"Leverage the manufacturing experience cloud template to set up a secure site for collaboration",B:"Leverage the salesforce site manufacturing cloud template to set up a secure site for collaboration",C:"Leverage my domain to set up a secure site for collaboration",D:"Leverage Heroku for Manufacturing cloud to set up a secure site for collaboration"},answer:["A"],multi:false},
{id:13,q:"Which three actions are available when using the mass update multiple values of a single metric of a sales agreement terms tab?",options:{A:"Replace with",B:"Decrease by",C:"Update with",D:"Multiple by",E:"Increase by"},answer:["A","B","E"],multi:true},
{id:14,q:"The service agents at Universal Containers reported that it takes too long to find information related to contacts and accounts, such as Cases, Assets, Warranties, and Claims.\nWhat should the consultant recommend to make the support process easier?",options:{A:"Create a custom Case Lightning record page.",B:"Enable the Service Console app.",C:"Enable the Service Console for Manufacturing app."},answer:["C"],multi:false},
{id:15,q:"Many of Universal Containers' management teams must travel to different production facilities. They require access to features on their desktop and mobile devices to view and approve sales agreements.\nWhat is an important consideration to keep in mind when preparing and conducting testing?",options:{A:"The Mobile User permission must be assigned to the test users.",B:"Sales Agreement features are not available on mobile devices, but approvals can be done via email.",C:"When testing Manufacturing Cloud for mobile, a Wi-Fi connection is required."},answer:["B"],multi:false},
{id:16,q:"Where would a consolidated view of all of the terms of a sales agreement, including the duration, products, price, planned quantities, and actual quantities be found?",options:{A:"Rebate Management in Manufacturing Cloud",B:"Sales Agreement in Manufacturing Cloud",C:"Account Based Forecast in Manufacturing Cloud",D:"Account Manager Targets in Manufacturing Cloud",E:"Contracts in Manufacturing Cloud"},answer:["B"],multi:false},
{id:17,q:"After selecting the manufacturing template in the community creation wizard, which tool can be used to customize the site?",options:{A:"Template Builder",B:"Experience Builder",C:"Site Builder",D:"Partner Builder",E:"Process Builder"},answer:["B"],multi:false},
{id:18,q:"What is required before the analytics for manufacturing App can be created?",options:{A:"Refresh sales agreements to be analyzed",B:"At least dashboard must exist in each of the manufacturing cloud objects to be analyzed",C:"Refresh forecasts to be analyzed",D:"At least one record must exist in each of the Manufacturing cloud objects to be analyzed"},answer:["D"],multi:false},
{id:19,q:"A consultant is implementing Manufacturing Cloud. After the consultant concludes the discovery phase, the customer identifies additional must-have features for the platform.\nWhich recommendation should the consultant make regarding these additional features?",options:{A:"Add the feature in the project scope.",B:"Create a change request and arbitrate based on other features.",C:"Remove another feature from the list of requirements to account for the additional workload."},answer:["B"],multi:false},
{id:20,q:"Which two statements are correct regarding the visibility of invalid team assignments?",options:{A:"Invalid target assignments are shown in the Notifications section of the Assignments tab in the target's record",B:"Invalid target assignments are shown in Invalid Team Assignments section of a target only if you are the owner of that target.",C:"Invalid target assignments are shown in the Invalid Team Assignments section of the Assignments tab in the target's record.",D:"Invalid target assignments are shown in Invalid Team Assignments related list on the Account Manager Target home page.",E:"Invalid target assignments can be seen in the Invalid Target Assignments report."},answer:["B","C"],multi:true},
{id:21,q:"Which method can be used to calculate Actuals for sales agreements?",options:{A:"Automatically from contracts through orders.",B:"Automatically from direct orders",C:"Automatically from direct contracts",D:"Manually using api upload",E:"Automatically from orders through contracts"},answer:["B"],multi:false},
{id:22,q:"When loading data into Salesforce Manufacturing Cloud, following a specific order of operations is crucial. Which option represents the correct order?",options:{A:"Load Products, Accounts, and Contacts first, followed by Orders and, finally, Sales Agreements.",B:"Load Accounts, Sales Agreements, and Orders first followed by Contacts and, finally, Products.",C:"Load Accounts, Contacts, and Products first, followed by Sales Agreements and, finally, Orders."},answer:["C"],multi:false},
{id:23,q:"Before setting up Manufacturing Cloud, Universal Containers must complete certain prerequisites. Which objects must be set up for sales agreements?",options:{A:"Accounts, Contacts, Products, and Price Books",B:"Accounts, Contacts, Products, Opportunities, and Price Books",C:"Accounts, Contacts, Products, Orders, and Price Books"},answer:["A"],multi:false},
{id:24,q:"Universal Containers is using sales agreements and does not want to bring actual orders data into salesforce. However, they want to use the actual orders data to analyze the effectiveness of their sales agreements.\nWhich actual calculation option must be selected?",options:{A:"Automatically from orders through contracts",B:"Manually Using actual orders API",C:"Automatically from direct orders",D:"Manually using APL upload"},answer:["B"],multi:false},
{id:25,q:"The Salesforce administrator at a small manufacturer of fasteners for the automobile industry is configuring Manufacturing Cloud. The manufacturer currently manages orders and contracts in an external system (SAP).\nWhich actuals calculation option should the administrator select?",options:{A:"Manually using API upload",B:"Automatically from orders through contracts",C:"Automatically from direct orders"},answer:["A"],multi:false},
{id:26,q:"A customer is concerned about whether data for accounts, contacts, and products should be managed in Salesforce exclusively.\nWhat should a consultant recommend?",options:{A:"The ERP is the source of truth for accounts, contacts, and products. Salesforce will consume the data as read-only.",B:"Salesforce is the source of truth for accounts, contacts, and products and is exclusively mastered there.",C:"Accounts, contacts, and products are in Salesforce; the lifecycle of these are codependent with other systems like ERP and PLM."},answer:["C"],multi:false},
{id:27,q:"An administrator has performed the data migration of sales agreements. How should the administrator test the data consistency across the legacy system and Salesforce?",options:{A:"Create custom reports to aggregate the sales agreements' values and compare with the legacy system.",B:"Use Data Loader to generate a .csv file and manually compare it to import files.",C:"Verify the migration file and compare randomly selected lines with the legacy system."},answer:["A"],multi:false},
{id:28,q:"Universal Containers would like to use Manufacturing Cloud to forecast its spare part demand based on the number of defective part cases logged by customers and part orders requested by distribution partners.\nWhich customization is required for Advanced Account Forecasting?",options:{A:"A custom forecast fact table",B:"A custom forecast fact table and DPE definition",C:"A custom forecast fact table with the DPE definition from the prebuilt asset, Generate Forecast for Product Categories"},answer:["B"],multi:false},
{id:29,q:"Universal Containers has implemented Manufacturing Cloud Sales Agreements to manage run rate business. The actuals are updated directly from the orders.\nIn which order should the administrator migrate the data from the legacy system?",options:{A:"Accounts, Sales Agreements, Sales Agreements Products, Orders",B:"Accounts, Sales Agreements, Sales Agreements Schedules, Orders",C:"Orders, Accounts, Sale Agreement, Sales Agreement Products"},answer:["A"],multi:false},
{id:30,q:"Sales Management has decided that Account Managers should be measured on a CSAT target.\nWhich option describes the steps the Admin should take?",options:{A:"Add a picklist value on the Measure Type field with Label = CSAT and add Target Type = Other, on the Account Manager object",B:"Add a picklist value 'CSAT' to the Measure field and add Measure Type = CSAT, on the Target object",C:"Add a picklist value on the Measure field with Label = CSAT and add Measure Type = Other, on the Account Manager Target object",D:"Add a picklist value 'CSAT' to the Type Field and add Target Type = Other, on the Account Target object"},answer:["C"],multi:false},
{id:31,q:"Which data load sequence should be followed when loading data into Sales agreement?",options:{A:"Sales Agreement",B:"Sales Agreement Product",C:"Sales Agreement Product schedule"},answer:["A","B","C"],multi:true},
{id:32,q:"Which dashboard in the Advanced Account Forecasting Analytics app should a user access to do a deep-dive and understand forecasts and actuals by custom dimensions?",options:{A:"Account Health",B:"Account Insights",C:"Forecast Analysis"},answer:["C"],multi:false},
{id:33,q:"A new custom field is created on the Account Product Forecast (APF) Table. Account Managers have already been assigned the standard Manufacturing Account Forecast permission set.\nWhich two actions can be taken to give Account Managers 'Read' access to this new field?",options:{A:"Clone the standard permission set Manufacturing Account Forecast to a new permission set with license type Manufacturing Forecast Psl. Grant Read access to the field. Assign to Account Managers.",B:"Create a new custom permission set of license type 'Salesforce'. Grant Read access to the field. Assign to Account Managers.",C:"Give 'Read' access to the field on the standard Manufacturing Account Forecast permission set.",D:"Clone the standard permission set Account Forecast to a new permission set with license type 'Salesforce'. Grant 'Read' access to the field. Assign to Account Managers."},answer:["A","B"],multi:true},
{id:34,q:"An Admin is creating an app from the Analytics for manufacturing template in Tableau CRM. Which Rebate Management object supports custom fields for rebate program(s) analysis?",options:{A:"Program Rebate Type Benefit",B:"Program Rebate Type",C:"Rebate Program",D:"Rebate Member Product Aggregate"},answer:["C"],multi:false},
{id:35,q:"Which object is required to create a Sales agreement?",options:{A:"Account",B:"B)",C:"Contract",D:"Order",E:"Quote"},answer:["A"],multi:false},
{id:36,q:"Which two methods can be used to recalculate payouts after the payout period is closed?",options:{A:"Recalculate payouts due to changed benefits",B:"Renew payouts with benefit charges",C:"Recalculate payouts with no charge in benefits",D:"Receive payouts with charged benefits",E:"Recalculate account benefit charge"},answer:["A","C"],multi:true},
{id:37,q:"Which insights does a user get from Order Forecasting for Manufacturing CRMA app?",options:{A:"Forecasted value only for the specified time period",B:"Forecasted value only for the next 3 months",C:"Forecasted value, range of forecasts, and accuracy"},answer:["C"],multi:false},
{id:38,q:"An admin wants to create new custom metric on the Account product period forecast component.\nWhat needs to be done to make the metric available on the Account forecast component?",options:{A:"Create a custom field on Account Forecast, create a custom field on account product, map both in the account forecast setting page.",B:"Create a custom field on account product period forecast, create a custom field on account product forecast, map both in the account forecast setting page.",C:"Create a custom field on Sales agreement product, Create a custom field on Sales agreement product period, map both in the Sales agreement setting page.",D:"Create a custom field on account forecast adjustment, Create a custom field on account forecast adjustment period, map both in the account forecast setting page."},answer:["B"],multi:false},
{id:39,q:"The administrator at Bonsai Manufacturing wants to renew several sales agreements. Which status on the sales agreement restricts the administrator from renewing?",options:{A:"Expired",B:"Activated",C:"Approved"},answer:["B"],multi:false},
{id:40,q:"Universal container wants to enter a sales agreement for Widget A. Which three minimum data elements are required on sales agreement?",options:{A:"Opp, Pricebook, Product",B:"Account, Opp, Contracts",C:"Account, Price book, Product",D:"Account, Product, Orders"},answer:["C"],multi:false},
{id:41,q:"Which two objects do not support triggers?",options:{A:"Account Forecast Adjustments (AFA)",B:"Account Forecast (AF)",C:"Account Product Period Forecast (APPF)",D:"Account Product Forecast (APF)"},answer:["B","C"],multi:true},
{id:43,q:"UC's chemicals are shipped in various tank sizes. UC has requested to show the agreed and delivered volume on each schedule and in the actual figures.\nWhat should a Manufacturing Cloud consultant recommend?",options:{A:"Create custom fields to store the volume, create a Metric Mapping, and then add the metric to the Agreement Terms.",B:"Create custom fields for volume and total volume, and a before save flow to calculate the total volume. Add a Metric Mapping to display the metrics.",C:"Create a custom field to store the volume and a formula field to multiply the volume by the quantity. Add the metric to the Agreement Terms."},answer:["A"],multi:false},
{id:44,q:"An Account Manager at Badger Power wants to renew their current Sales Agreement. When can the Sales Agreement renewal occur?",options:{A:"Only when the new fiscal period starts.",B:"Only when the renewal period ends.",C:"Only when the renewal period starts.",D:"Only when the sales agreement recalculates.",E:"Only when the sales agreement regenerates."},answer:["C"],multi:false},
{id:45,q:"When an Admin is configuring Account Forecast Calculation Settings, what is the consequence if Sales Agreement List View is NOT selected?",options:{A:"Only approved sales agreements in the Salesforce org will be considered.",B:"All sales agreements within the generation period will be considered.",C:"No sales agreements will be considered.",D:"All active and expired sales agreements will be considered.",E:"Only sales agreements with approved adjustments will be considered."},answer:["B"],multi:false},

{id:47,q:"An Account Manager edits the account and market growth percentage values and triggers a forecast recalculation.\nWhen will these new values be used in forecasting the future periods?",options:{A:"When the forecast is calculated for the first time.",B:"When a new forecast is generated for the account.",C:"When the Account Manager is the Account owner.",D:"When account and market growth percentages are used in the forecast formula."},answer:["D"],multi:false},
{id:48,q:"Which three conditions need to be fulfilled so that an order is included in the Actuals calculation process on a Sales Agreement?",options:{A:"The order needs to have Status = Activated.",B:"The date in the Order Date field should be in the past.",C:"The date in the Order Date field should be in the future.",D:"The order needs to have Category = Activated.",E:"The Sales Agreement field needs to be populated on the Order."},answer:["A","B","E"],multi:true},
{id:49,q:"An administrator has completed the data migration from a client's legacy system to Manufacturing Cloud. The client wants to ensure all Advanced Account Forecast calculations are correct.\nHow should the administrator reassure the client?",options:{A:"Use Data Loader to generate a .csv file and manually compare it to import files.",B:"Launch the calculations of the Advanced Account Forecast and compare the values with the legacy system.",C:"Request the users to verify the Advanced Account Forecast values of their accounts."},answer:["B"],multi:false},
{id:50,q:"Universal Containers uses Sales Agreements and wants to avoid bringing actual orders data into Manufacturing Cloud. However, UC wants to use the actual orders data for its sales agreements.\nWhich Actuals Calculation mode must be selected?",options:{A:"Manually using Actual Orders API",B:"Manually using API upload",C:"Automatically from orders through contracts"},answer:["A"],multi:false},
{id:51,q:"How does Salesforce Manufacturing Cloud help businesses monitor and evaluate system performance against their business process flows?",options:{A:"With built-in demand forecasting and inventory tracking features",B:"By providing real-time analytics for manufacturing performance metrics",C:"Through Seamless integration with ERP and Inventory systems"},answer:["B"],multi:false},
{id:52,q:"Universal Containers is using Account Based Forecasting and expects a 5% increase in the market but has a target growth of 10%.\nWhere should the Account owner add the additional 5%?",options:{A:"Update the Account Forecast to 10%.",B:"Set 5% value in Account Growth.",C:"Update the Market Growth to 10%."},answer:["B"],multi:false},

{id:59,q:"Which automation must the consultant consider when loading order data associated with sales agreements for actual calculations?",options:{A:"If order quantities are uploaded in bulk at regular intervals using API upload, the application will reflect these updates after the daily scheduled Salesforce jobs.",B:"Orders with the same date as the sales agreement start date will be included in the actual quantity as long as the SA status is Activated and the order status is Activated.",C:"Actuals are calculated through an hourly automated process, and users must wait until the top of the hour to see results."},answer:["C"],multi:false},

let currentIdx=0,score=0,attempted=0,checked=false,userAnswers={},checkedSet=new Set(),wrongSet=new Set(),order=[],optOrder={};
const $=id=>document.getElementById(id);

function init(){
  order=questions.map((_,i)=>i);
  loadProgress();
  if($('shuffleMode').checked)shuffle(order);
  render();
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}}

function filterWrong(){
  if($('wrongOnly').checked){
    order=[...wrongSet];
    if(order.length===0){alert('오답이 없습니다!');$('wrongOnly').checked=false;return}
  }else{
    order=questions.map((_,i)=>i);
    if($('shuffleMode').checked)shuffle(order);
  }
  currentIdx=0;checked=false;render();
}

function resetQuiz(){
  if($('shuffleMode').checked){order=questions.map((_,i)=>i);shuffle(order)}
  else{order=questions.map((_,i)=>i)}
  currentIdx=0;score=0;attempted=0;checked=false;userAnswers={};checkedSet.clear();wrongSet.clear();optOrder={};
  localStorage.removeItem('mfg_quiz');render();
}

function render(){
  if(currentIdx>=order.length){showResults();return}
  const qi=order[currentIdx],q=questions[qi];
  checked=checkedSet.has(qi);
  $('qCounter').textContent=`문제 ${currentIdx+1} / ${order.length}`;
  $('scoreDisplay').textContent=`✓ ${score} / ${attempted}`;
  $('progressFill').style.width=((currentIdx+1)/order.length*100)+'%';

  let h=`<div class="card"><div class="q-number">Q${q.id}</div>`;
  h+=`<div class="q-text">${esc(q.q)}</div>`;
  if(q.multi)h+=`<div class="q-hint">${q.answer.length}개를 선택하세요</div>`;

  const ua=userAnswers[qi];
  if(!optOrder[qi]){const k=Object.keys(q.options);shuffle(k);optOrder[qi]=k}
  const keys=optOrder[qi];
  keys.forEach((k,i)=>{
    let cls='option';
    const isSel=ua&&ua.includes(k);
    const isCorr=q.answer.includes(k);
    if(checked){
      if(isSel&&isCorr)cls+=' correct';
      else if(isSel&&!isCorr)cls+=' wrong';
      else if(!isSel&&isCorr)cls+=' show-correct';
    }else if(isSel)cls+=' selected';

    const type=q.multi?'checkbox':'radio';
    const chk=(isSel)?'checked':'';
    const dis=checked?'disabled':'';
    h+=`<div class="${cls}" onclick="toggleOpt(${qi},'${k}',${q.multi})" id="opt_${qi}_${k}">`;
    h+=`<input type="${type}" name="q${qi}" ${chk} ${dis} tabindex="-1">`;
    h+=`<span class="option-key">${k}.</span>`;
    h+=`<span class="option-label">${esc(q.options[k])}</span></div>`;
  });

  h+=`</div>`;
  h+=`<div class="keyboard-hint">키보드: 1~${keys.length} 선택 | Enter 정답확인 | ← → 이동</div>`;
  $('main').innerHTML=h;

  $('checkBtn').disabled=checked;
  $('prevBtn').disabled=currentIdx===0;
  $('nextBtn').textContent=currentIdx>=order.length-1?'결과 보기 →':'다음 →';
  $('navBar').style.display='flex';
}

function toggleOpt(qi,key,multi){
  if(checked)return;
  if(!userAnswers[qi])userAnswers[qi]=[];
  const ua=userAnswers[qi];
  if(multi){
    const idx=ua.indexOf(key);
    if(idx>-1)ua.splice(idx,1);else ua.push(key);
  }else{
    userAnswers[qi]=[key];
  }
  render();
}

function checkAnswer(){
  const qi=order[currentIdx],q=questions[qi];
  const ua=userAnswers[qi];
  if(!ua||ua.length===0){alert('답을 선택하세요!');return}
  checked=true;checkedSet.add(qi);attempted++;
  const isCorrect=q.answer.length===ua.length&&q.answer.every(a=>ua.includes(a));
  if(isCorrect)score++;else wrongSet.add(qi);
  userAnswers[qi]=ua;
  saveProgress();render();
}

function go(dir){
  if(dir===1&&!checked&&!userAnswers[order[currentIdx]]){currentIdx++;render();return}
  currentIdx+=dir;
  if(currentIdx<0)currentIdx=0;
  if(currentIdx>order.length)currentIdx=order.length;
  render();
}

function showResults(){
  const pct=attempted>0?Math.round(score/attempted*100):0;
  const pass=pct>=65;
  let h=`<div class="card score-box">`;
  h+=`<div class="big">${pct}%</div>`;
  h+=`<div class="pct">${score} / ${attempted} 정답</div>`;
  h+=`<div class="detail">총 ${order.length}문제 중 ${attempted}문제 풀이</div>`;
  h+=`<div class="grade ${pass?'grade-pass':'grade-fail'}">${pass?'PASS':'FAIL'} (합격 기준: 65%)</div>`;
  h+=`<br><button class="btn btn-primary" onclick="resetQuiz()" style="margin:8px">처음부터 다시</button>`;
  h+=`<button class="btn btn-outline" onclick="reviewWrong()" style="margin:8px">오답 복습 (${wrongSet.size}문제)</button>`;
  h+=`</div>`;

  if(wrongSet.size>0){
    h+=`<div class="card" style="margin-top:16px"><h3 style="margin-bottom:12px">오답 목록</h3>`;
    [...wrongSet].forEach(qi=>{
      const q=questions[qi];
      h+=`<div class="result-item" onclick="jumpTo(${qi})">`;
      h+=`<span class="result-icon" style="color:#e53935">✗</span>`;
      h+=`<span>Q${q.id}: ${esc(q.q.substring(0,80))}...</span></div>`;
    });
    h+=`</div>`;
  }

  $('main').innerHTML=h;
  $('navBar').style.display='none';
  $('qCounter').textContent='결과';
  $('progressFill').style.width='100%';
}

function reviewWrong(){
  if(wrongSet.size===0){alert('오답이 없습니다!');return}
  order=[...wrongSet];currentIdx=0;
  score=0;attempted=0;
  wrongSet.forEach(qi=>{delete userAnswers[qi];checkedSet.delete(qi)});
  wrongSet.clear();checked=false;
  $('navBar').style.display='flex';render();
}

function jumpTo(qi){
  const idx=order.indexOf(qi);
  if(idx>-1){currentIdx=idx;checked=!!userAnswers[qi];$('navBar').style.display='flex';render()}
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function saveProgress(){
  try{localStorage.setItem('mfg_quiz',JSON.stringify({userAnswers,score,attempted,checkedSet:[...checkedSet],wrongSet:[...wrongSet]}))}catch(e){}
}
function loadProgress(){
  try{
    const d=JSON.parse(localStorage.getItem('mfg_quiz'));
    if(d){userAnswers=d.userAnswers||{};score=d.score||0;attempted=d.attempted||0;checkedSet=new Set(d.checkedSet||[]);wrongSet=new Set(d.wrongSet||[])}
  }catch(e){}
}

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'&&e.target.type==='text')return;
  const qi=order[currentIdx],q=questions[qi];
  if(!q)return;
  const keys=Object.keys(q.options);
  if(e.key>='1'&&e.key<='9'){
    const idx=parseInt(e.key)-1;
    if(idx<keys.length&&!checked)toggleOpt(qi,keys[idx],q.multi);
  }
  if(e.key==='Enter'&&!checked)checkAnswer();
  if(e.key==='ArrowRight')go(1);
  if(e.key==='ArrowLeft')go(-1);
});

init();
</script>
